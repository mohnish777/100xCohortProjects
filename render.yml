services:
  - type: web
    name: clinical-ai-api
    env: python
    region: oregon
    plan: free
    branch: master  # or 'master'
    
    # 🎯 THIS IS THE KEY - Point to subdirectory
    rootDir: srotasHealth/clinical-ai
    
    # Build command (relative to rootDir)
    buildCommand: pip install -r requirements.txt
    
    # Start command (relative to rootDir)
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    
    healthCheckPath: /health
    autoDeploy: true
    
    # Environment variables
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      
      - key: ELEVENLABS_API_KEY
        sync: false
      
      - key: SUPABASE_URL
        sync: false
      
      - key: SUPABASE_KEY
        sync: false
      
      - key: PYTHON_VERSION
        value: "3.11"
      